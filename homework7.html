<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Event Reminder</h2>
    <p id="demo"></p>
    <h4>Message:</h4>
    <p id="condition"></p>
    <script>
        var today =new Date();
        var dat = new Date("2025-08-13");
        var year =dat.getFullYear();
        var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        var month =  months[dat.getMonth()];
        var day = dat.getDay();
        document.getElementById("demo").innerHTML = year +", " + month + ", " + day ;
        
        var yearCount = today.getFullYear -year;
        if (yearCount>1) {
            text = "It has been more than a year since that date."
        }else {
            text= "It has been less than a year since that date."
        }
        document.getElementById("condition").innerHTML = text;
    </script>
</body>
</html>
